name: Build release zip

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Read plugin id from manifest
        id: meta
        run: |
          id=$(node -p "require('./manifest.json').id")
          echo "id=$id" >> "$GITHUB_OUTPUT"

      - name: Build install zip
        run: |
          rm -rf staging
          mkdir -p "staging/${{ steps.meta.outputs.id }}"
          cp main.js manifest.json staging/${{ steps.meta.outputs.id }}/
          if [ -f styles.css ]; then cp styles.css staging/${{ steps.meta.outputs.id }}/; fi
          (cd staging && zip -r "../${{ steps.meta.outputs.id }}.zip" "${{ steps.meta.outputs.id }}/")
          ls -la "${{ steps.meta.outputs.id }}.zip"

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ steps.meta.outputs.id }}.zip" \
            --repo "${{ github.repository }}" \
            --clobber
